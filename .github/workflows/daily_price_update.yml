name: Daily NSE Price Update

on:
  schedule:
    - cron: "0 15 * * 1-5"   # 15:00 UTC = 18:00 EAT, Mon–Fri (after NSE closes at 15:00 EAT)
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to update (leave empty for all)"
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run daily inference & push to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          TARGET_TICKERS: ${{ github.event.inputs.tickers }}
        run: |
          cd $GITHUB_WORKSPACE
          python pipeline/scripts/run_inference.py

      - name: Notify on failure
        if: failure()
        run: echo "::error::Daily price update failed — check logs above"
