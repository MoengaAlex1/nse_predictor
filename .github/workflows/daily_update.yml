name: Daily NSE Update

on:
  schedule:
    - cron: "10 13 * * 1-5"   # 13:10 UTC = 16:10 EAT, Mon-Fri (after NSE close)
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers (blank = all)"
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run daily update
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          NSE_TICKERS_FILTER: ${{ github.event.inputs.tickers }}
        run: |
          set -o pipefail
          cd $GITHUB_WORKSPACE
          python pipeline/scripts/run_daily_update.py 2>&1 | tee /tmp/daily_update.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-update-log-${{ github.run_id }}
          path: /tmp/daily_update.log
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily update failed — check the artifact log"
          tail -30 /tmp/daily_update.log || true
