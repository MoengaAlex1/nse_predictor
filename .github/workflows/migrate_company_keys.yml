name: Migrate Company Keys

# One-shot migration: moves Firestore company documents from the old
# TICKER_NR key format (e.g. SCOM_NR) to the short-ticker key (e.g. SCOM).
# Copies price history from old docs, then deletes them.
# Run ONCE after the ticker-key migration commit.

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Migrate company keys in Firestore
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run migration
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          set -o pipefail
          cd $GITHUB_WORKSPACE
          python pipeline/scripts/migrate_to_short_keys.py 2>&1 | tee /tmp/migrate.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migrate-log-${{ github.run_id }}
          path: /tmp/migrate.log
          retention-days: 14
