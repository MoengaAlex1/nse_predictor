name: NSE Daily Price Capture (3× per day)

# Runs three times every NSE trading day (Mon–Fri, EAT = UTC+3):
#   09:00 EAT — opening price snapshot
#   14:00 EAT — midday overwrite
#   15:30 EAT — final closing price (NSE closes at 15:00 EAT)
#
# Each run:
#   Step 1 – scrape_nse_prices.py  → fetch latest prices, update Firebase Storage CSVs
#   Step 2 – push_intraday_prices.py → read updated CSVs, push price_history +
#             current_price + change_pct_today to Firestore (live website update)
#
# The nightly daily_update.yml (midnight EAT) handles full model retraining
# and buy/sell/hold signal generation — that job is not replaced by this one.

on:
  schedule:
    - cron: "0 6 * * 1-5"     # 06:00 UTC = 09:00 EAT — market open
    - cron: "0 11 * * 1-5"    # 11:00 UTC = 14:00 EAT — midday
    - cron: "30 12 * * 1-5"   # 12:30 UTC = 15:30 EAT — market close
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill date range FROM:TO (e.g. 2026-07-16:2026-07-17). Leave blank for today."
        required: false
        default: ""
      tickers:
        description: "Comma-separated tickers to update (blank = all)"
        required: false
        default: ""
      skip_firestore_push:
        description: "Set to 'true' to scrape only (skip Firestore push)"
        required: false
        default: "false"

jobs:
  capture:
    name: Scrape + push prices to Firestore
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      # ── Step 1: Scrape NSE prices → update Firebase Storage CSVs ─────────────
      - name: Scrape NSE prices
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          NSE_TICKERS_FILTER: ${{ github.event.inputs.tickers }}
        run: |
          set -o pipefail
          cd $GITHUB_WORKSPACE

          if [ -n "${{ github.event.inputs.backfill }}" ]; then
            echo "Backfill mode: ${{ github.event.inputs.backfill }}"
            python pipeline/scripts/scrape_nse_prices.py \
              --backfill "${{ github.event.inputs.backfill }}" 2>&1 | tee /tmp/scrape.log
          else
            HOUR=$(date -u +%H)
            if   [ "$HOUR" -lt 8  ]; then SESSION="open";
            elif [ "$HOUR" -lt 12 ]; then SESSION="midday";
            else                          SESSION="close";
            fi
            echo "Session: $SESSION (UTC hour: $HOUR)"
            python pipeline/scripts/scrape_nse_prices.py \
              --session "$SESSION" 2>&1 | tee /tmp/scrape.log
          fi

      # ── Step 2: Push prices to Firestore (live website update) ───────────────
      - name: Push prices to Firestore
        if: ${{ github.event.inputs.skip_firestore_push != 'true' && github.event.inputs.backfill == '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          NSE_TICKERS_FILTER: ${{ github.event.inputs.tickers }}
        run: |
          set -o pipefail
          cd $GITHUB_WORKSPACE
          python pipeline/scripts/push_intraday_prices.py 2>&1 | tee /tmp/push.log

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-capture-log-${{ github.run_id }}
          path: |
            /tmp/scrape.log
            /tmp/push.log
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Price capture failed — check artifact logs"
          echo "=== scrape.log ===" && tail -20 /tmp/scrape.log || true
          echo "=== push.log ===" && tail -20 /tmp/push.log || true
