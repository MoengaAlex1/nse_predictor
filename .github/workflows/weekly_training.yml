name: Weekly NSE Model Training

on:
  schedule:
    - cron: "0 23 * * 0"    # 23:00 UTC Saturday = 02:00 EAT Sunday
  workflow_dispatch:

jobs:
  training:
    runs-on: ubuntu-latest
    timeout-minutes: 360     # 6 hours: 62 companies × ~5 min LSTM + overhead

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run training
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          set -o pipefail
          cd $GITHUB_WORKSPACE
          python pipeline/scripts/run_training.py 2>&1 | tee /tmp/training.log

      - name: Upload training log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-log-${{ github.run_id }}
          path: /tmp/training.log
          retention-days: 14

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Weekly training failed — review the artifact log above"
          echo "Last 50 lines of log:"
          tail -50 /tmp/training.log || true
